version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rss-reader-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - rss-data:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rss-reader-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  rss-data:
